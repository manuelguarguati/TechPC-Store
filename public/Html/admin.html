<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel Admin</title>
</head>
<body>
  <h1>Agregar Producto</h1>
  <form id="productForm">
    <input type="text" id="name" placeholder="Nombre" required><br>
    <textarea id="description" placeholder="Descripción" required></textarea><br>
    <input type="number" id="price" placeholder="Precio" required><br>
    <input type="number" id="stock" placeholder="Stock" required><br>
    <input type="text" id="image" placeholder="URL de imagen"><br>
    <button type="submit">Agregar</button>
  </form>

  <script>
    document.getElementById('productForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const data = {
        name: document.getElementById('name').value,
        description: document.getElementById('description').value,
        price: document.getElementById('price').value,
        stock: document.getElementById('stock').value,
        image: document.getElementById('image').value
      };

      const res = await fetch('/products/add', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });

      const result = await res.json();
      alert('Producto agregado con éxito');
      console.log(result);
    });
  </script>
</body>
</html>
